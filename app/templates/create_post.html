<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Post</title>
    <link rel="stylesheet" href="/static/css/global-theme.css" />
    <link rel="stylesheet" href="/static/css/header-enhancements.css" />
    <!-- Include Quill stylesheet -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet" />
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding-top: 100px;
            padding-bottom: 2rem;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        h1 {
            color: var(--secondary-color);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .form-container {
            background: var(--glass-bg-strong);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow-light);
        }

        #editor-container {
            height: 400px;
            background: var(--glass-bg);
            border-radius: 12px;
            box-shadow: var(--shadow-dark);
            margin-bottom: 1.5rem;
            border: 1px solid var(--glass-border);
        }

        .ql-toolbar.ql-snow {
            border-radius: 12px 12px 0 0;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
        }

        .ql-container.ql-snow {
            border-radius: 0 0 12px 12px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-top: none;
        }

        .ql-editor {
            color: var(--secondary-color);
            font-size: 1rem;
        }

        .ql-editor.ql-blank::before {
            color: var(--secondary-color);
            opacity: 0.6;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            color: var(--secondary-color);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 184, 148, 0.2);
        }

        input::placeholder {
            color: var(--secondary-color);
            opacity: 0.6;
        }

        button {
            background: var(--primary-color);
            color: var(--secondary-color);
            border: none;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            margin: 0 auto;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-dark);
        }

        button:hover {
            background: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.4);
        }
    </style>
</head>
<body>
    {% include '_header.html' %}
    <main>
        <h1>Create a New Post</h1>
        <div class="form-container">
            <form id="postForm">
                <input type="text" id="postTitle" name="title" placeholder="Enter post title" required />
                <div id="editor-container"></div>
                <button type="submit">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true" focusable="false" style="vertical-align: middle; margin-right: 6px;">
                        <path d="M15.854.146a.5.5 0 0 0-.707 0L.146 15.146a.5.5 0 0 0 .707.708L6 11.207V14.5a.5.5 0 0 0 1 0v-3.293l5.146 5.147a.5.5 0 0 0 .708-.707L6.707 10.5H14.5a.5.5 0 0 0 0-1H6.707l9.147-9.146a.5.5 0 0 0 0-.708z"/>
                    </svg>
                    Publish Post
                </button>
            </form>
        </div>
    </main>

    <!-- Include Quill library -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ header: [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    ['image', 'code-block'],
                    [{ list: 'ordered' }, { list: 'bullet' }],
                    ['clean']
                ]
            }
        });

        document.getElementById('postForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const content = quill.root.innerHTML;
            alert('Post content to be submitted:\n' + content);
            // Submit post content to backend API
            fetch('/api/posts', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'same-origin',
                body: JSON.stringify({ title: document.getElementById('postTitle').value, content: content })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    alert('Post created successfully!');
                    quill.setContents([]);
                    document.getElementById('postTitle').value = '';
                } else {
                    alert('Error creating post: ' + data.message);
                }
            })
            .catch(error => {
                alert('Error creating post: ' + error);
            });
        });
    </script>
    <footer>
        &copy; 2024 Orumba North. All rights reserved.
    </footer>
</body>
</html>
