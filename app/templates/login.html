<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Orumba North</title>
    <link rel="stylesheet" href="/static/css/global-theme.css" />
    <link rel="stylesheet" href="/static/css/header-enhancements.css" />
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .login-container {
            background: var(--glass-bg-strong);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--shadow-light);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            color: var(--secondary-color);
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--secondary-color);
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            font-size: 1rem;
            color: var(--secondary-color);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 184, 148, 0.2);
        }
        input::placeholder {
            color: var(--secondary-color);
            opacity: 0.6;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--secondary-color);
            transition: all 0.3s ease;
            box-shadow: var(--shadow-dark);
        }
        button:hover,
        button:focus {
            background-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.4);
            outline: none;
        }
        .message {
            margin-top: 1rem;
            text-align: center;
            font-weight: 600;
        }
        .link {
            margin-top: 1.5rem;
            text-align: center;
        }
        .link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .link a:hover,
        .link a:focus {
            color: var(--accent-color);
            text-decoration: underline;
            outline: none;
        }
        .link p {
            color: var(--secondary-color);
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="login-container" role="main" aria-labelledby="login-title">
        <h1 id="login-title">Login</h1>
        <form id="login-form" aria-describedby="login-message">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter your username" />
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password" />
            <button type="submit">Log In</button>
            <div id="login-message" class="message" role="alert" aria-live="assertive"></div>
        </form>
        <div class="link">
            <p>Don't have an account? <a href="/register">Register here</a></p>
        </div>
    </div>
    <script>
        const form = document.getElementById('login-form');
        const messageDiv = document.getElementById('login-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageDiv.textContent = '';
            const username = form.username.value.trim();
            const password = form.password.value.trim();

            if (!username || !password) {
                messageDiv.textContent = 'Please enter both username and password.';
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    messageDiv.style.color = '#00ff88';
                    messageDiv.textContent = 'Login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    messageDiv.style.color = '#ff6b6b';
                    messageDiv.textContent = data.message || 'Login failed.';
                }
            } catch (error) {
                messageDiv.style.color = '#ff6b6b';
                messageDiv.textContent = 'An error occurred. Please try again.';
            }
        });
    </script>
</body>
</html>
