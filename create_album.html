<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Album - Orumba North</title>
    <link rel="stylesheet" href="/static/css/global-theme.css">
    <link rel="stylesheet" href="/static/css/header-enhancements.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Roboto', sans-serif;
            color: var(--secondary-color);
        }

        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
            padding-top: 80px;
        }

        .page-title {
            font-size: clamp(2rem, 5vw, 3rem);
            background: var(--glass-bg-strong);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem 2rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow-light);
            color: var(--secondary-color);
        }

        .form-container {
            background: var(--glass-bg-strong);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: var(--shadow-light);
            max-width: 800px;
            margin: 0 auto 2rem;
        }

        .post-entry {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .post-entry:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(31, 38, 135, 0.3);
        }

        .form-row {
            display: grid;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--secondary-color);
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            color: var(--secondary-color);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="file"] {
            border: 2px dashed var(--glass-border);
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            font-size: 1.1rem;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 184, 148, 0.25);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 2rem;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), #00d4aa);
            color: var(--secondary-color);
        }

        .btn-primary:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 15px 35px rgba(0, 184, 148, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--secondary-color);
            border: 2px solid var(--glass-border);
        }

        .btn-secondary:hover {
            border-color: var(--primary-color);
            background: var(--glass-bg-strong);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(255, 107, 107, 0.4);
        }

        .post-counter {
            text-align: center;
            color: var(--secondary-color);
            opacity: 0.8;
            margin: 1rem 0;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .btn-group {
                flex-direction: column;
                align-items: stretch;
            }

            .form-container {
                padding: 2rem 1.5rem;
                margin: 0 0.5rem;
            }
        }
    </style>
</head>
<body>
    {% include '_header.html' %}

    <main class="main-container">
        <section class="page-header">
            <h1 class="page-title">🖼️ Create Photo Album</h1>
            <p>Curate up to 6 beautiful images to share your moments with the Orumba North community</p>
        </section>

        <form id="albumForm" class="form-container">
            <div id="postsContainer">
                <!-- Dynamic post entries -->
            </div>

            <div class="post-counter" id="postCounter">
                Posts: <span id="postCount">0</span>/6
            </div>

            <div class="btn-group">
                <button type="button" id="addPostBtn" class="btn btn-primary">
                    ➕ Add Image
                </button>
                <button type="button" id="removePostBtn" class="btn btn-secondary">
                    ➖ Remove Last
                </button>
            </div>

            <button type="submit" class="btn btn-primary btn-full">
                🚀 Create & Publish Album
            </button>
        </form>
    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        const MAX_POSTS = 6;
        let postCount = 0;
        const quillEditors = [];

        function createPostEntry(index) {
            const container = document.createElement('div');
            container.className = 'post-entry';
            container.dataset.index = index;
            
            container.innerHTML = `
                <div class="form-row">
                    <div class="form-group">
                        <label>Caption</label>
                        <input type="text" placeholder="Describe this moment..." maxlength="200">
                    </div>
                    <div class="form-group">
                        <label>📷 Photo</label>
                        <input type="file" accept="image/*" required>
                    </div>
                </div>
                <div id="editor-${index}" style="height: 150px;"></div>
            `;

            document.getElementById('postsContainer').appendChild(container);

            // Initialize Quill
            const quill = new Quill(`#editor-${index}`, {
                theme: 'snow',
                modules: {
                    toolbar: [
                        ['bold', 'italic'],
                        [{ 'list': 'bullet' }],
                        ['clean']
                    ]
                },
                placeholder: 'Add optional description...'
            });
            quillEditors[index] = quill;
        }

        function updateCounter() {
            document.getElementById('postCount').textContent = postCount;
            document.getElementById('addPostBtn').disabled = postCount >= MAX_POSTS;
            document.getElementById('removePostBtn').disabled = postCount === 0;
        }

        document.getElementById('addPostBtn').onclick = () => {
            if (postCount < MAX_POSTS) {
                createPostEntry(postCount);
                postCount++;
                updateCounter();
            }
        };

        document.getElementById('removePostBtn').onclick = () => {
            if (postCount > 0) {
                const lastEntry = document.querySelector('.post-entry:last-child');
                lastEntry.remove();
                quillEditors[postCount - 1] = null;
                postCount--;
                updateCounter();
            }
        };

        // Form submission
        document.getElementById('albumForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const entries = document.querySelectorAll('.post-entry');
            const posts = [];
            
            for (let i = 0; i < entries.length; i++) {
                const entry = entries[i];
                const caption = entry.querySelector('input[type="text"]').value.trim();
                const fileInput = entry.querySelector('input[type="file"]');
                const content = quillEditors[i]?.root.innerHTML || '';
                
                if (!fileInput.files[0]) {
                    alert(`Please select image for post ${i + 1}`);
                    return;
                }
                
                // Upload image
                const formData = new FormData();
                formData.append('image', fileInput.files[0]);
                const uploadRes = await fetch('/api/upload-image', { method: 'POST', body: formData });
                const uploadData = await uploadRes.json();
                
                if (uploadData.status === 'success') {
                    posts.push({
                        image_url: uploadData.url,
                        caption: caption,
                        content: content || 'Photo post'
                    });
                } else {
                    alert('Image upload failed');
                    return;
                }
            }
            
            const res = await fetch('/api/albums', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ posts })
            });
            
            const data = await res.json();
            if (data.status === 'success') {
                alert('🎉 Album published successfully!');
                window.location.href = '/gallery';
            } else {
                alert('Error: ' + data.message);
            }
        };

        // Start with 1 post
        postCount = 1;
        createPostEntry(0);
        updateCounter();
    </script>
</body>
</html>
